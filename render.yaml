databases:
  - name: nepalwander-db
    plan: free
    databaseName: nepalwander
    user: nepalwander

services:
  # ── Django REST API ──────────────────────────────────────────
  - type: web
    name: nepalwander-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && gunicorn tourtech_backend.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /
    plan: free
    envVars:
      - key: DEBUG
        value: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: nepalwander-db
          property: connectionString
      # Set these manually in Render dashboard after first deploy:
      # ELEVENLABS_API_KEY
      # AGENT_ID
      # UNSPLASH_ACCESS_KEY

  # ── React / Vite Frontend ────────────────────────────────────
  - type: web
    name: nepalwander-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: nepalwander-api
          type: web
          property: url
      - key: VITE_ELEVENLABS_AGENT_ID
        value: agent_4901kmv3tab6ep6rdxhz84fcywk5
